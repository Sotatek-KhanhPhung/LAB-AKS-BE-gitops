trigger:
  branches:
    include:
      - main

pool:
  name: default

variables:
- group: backend-variables

steps:
- checkout: self

- task: Docker@2
  displayName: Build and push image to ACR
  inputs:
    command: buildAndPush
    containerRegistry: $(dockerRegistryServiceConnection)
    repository: $(imageRepository)
    dockerfile: Dockerfile
    tags: |
      $(Build.BuildId)
      latest

- script: |
    set -e

    git config --global user.email "azuredevops@local"
    git config --global user.name "azure-pipeline"

    git clone https://$(GITOPS_PAT)@github.com/your-org/backend-gitops.git gitops
    cd gitops

    sed -i "s#image: .*#image: $(containerRegistry)/$(imageRepository):$(Build.BuildId)#" k8s/backend/deployment.yaml

    git add k8s/backend/deployment.yaml
    git commit -m "Update backend image to $(Build.BuildId)"
    git push origin main
  displayName: Update GitOps repo%                                